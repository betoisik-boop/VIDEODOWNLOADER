name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller

      - name: Download ffmpeg.exe
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/2024-05-27-git-1c235b3531/ffmpeg-2024-05-27-git-1c235b3531-essentials_build.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          $ff = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $ff.FullName .\ffmpeg.exe
          Get-Item .\ffmpeg.exe | Format-List Name,Length

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name VideoDownloader --add-binary "ffmpeg.exe;." --collect-all yt_dlp app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Windows
          path: dist/VideoDownloader.exe

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: dist/VideoDownloader.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
